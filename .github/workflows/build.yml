name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/rhesis-ci:kde-6.11
      options: --privileged
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1

    steps:
      - uses: actions/checkout@v4

      - name: Determine build profile
        id: profile
        run: |
          if [[ "${{ github.ref_name }}" == v*-* ]]; then
            echo "profile=release-fast" >> "$GITHUB_OUTPUT"
          else
            echo "profile=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cargo build cache
        id: cargo-build-cache
        uses: actions/cache@v4
        with:
          path: |
            build/cmake-build
            build/artifacts
          key: cargo-build-${{ runner.arch }}-${{ steps.profile.outputs.profile }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'build.rs', 'resources.qrc', 'src/**/*.rs', 'src/**/*.cpp', 'src/**/*.h') }}
          restore-keys: |
            cargo-build-${{ runner.arch }}-${{ steps.profile.outputs.profile }}-
            cargo-build-${{ runner.arch }}-

      - name: Build artifacts
        env:
          RUST_BUILD_TYPE: ${{ steps.profile.outputs.profile }}
        run: ./scripts/build-common.sh --verbose --no-spinner

      - name: Build Flatpak
        run: ./scripts/build-flatpak.sh --verbose --no-spinner --no-runtimes

      - name: Build AppImage
        run: |
          ./scripts/build-appimage.sh \
            --linuxdeploy /opt/appimage-tools/linuxdeploy-x86_64.AppImage \
            --appimagetool /opt/appimage-tools/appimagetool-x86_64.AppImage \
            --verbose \
            --no-spinner

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: build/artifacts/flatpak/*.flatpak

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimages
          path: build/artifacts/appimage/*.AppImage

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          cp artifacts/flatpak/*.flatpak release/
          cp artifacts/appimages/*.AppImage release/
          ls -lh release/

      - name: Generate release body from metainfo
        run: python3 scripts/release-body.py io.github.dimkar3000.rhesis.metainfo.xml > release_body.md

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_body.md
