name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/rhesis-ci:kde-6.11
      options: --privileged
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1

    steps:
      - uses: actions/checkout@v4

      - name: Build artifacts
        run: ./scripts/build-common.sh --verbose --no-spinner

      - name: Build Flatpak
        run: ./scripts/build-flatpak.sh --verbose --no-spinner --no-runtimes

      - name: Build AppImage
        run: |
          ./scripts/build-appimage.sh \
            --linuxdeploy /opt/appimage-tools/linuxdeploy-x86_64.AppImage \
            --appimagetool /opt/appimage-tools/appimagetool-x86_64.AppImage \
            --verbose \
            --no-spinner

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: build/artifacts/flatpak/*.flatpak

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimages
          path: build/artifacts/appimage/*.AppImage

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          cp artifacts/flatpak/*.flatpak release/
          cp artifacts/appimages/*.AppImage release/
          ls -lh release/

      - name: Generate release body from metainfo
        run: python3 scripts/release-body.py io.github.dimkar3000.rhesis.metainfo.xml > release_body.md

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_body.md
