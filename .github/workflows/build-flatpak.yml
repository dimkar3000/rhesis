name: Build Flatpak

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/rhesis-ci:kde-6.10
      options: --privileged

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate cargo-sources.json
        run: |
          mkdir -p build
          flatpak-cargo-generator Cargo.lock -o build/cargo-sources.json

      - name: Add flathub remote
        run: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --disable-rofiles-fuse \
            --force-clean \
            --repo=build/repo \
            build/flatpak-build-dir \
            io.github.dimkar3000.rhesis.json

      - name: Build bundle
        run: flatpak build-bundle build/repo build/rhesis.flatpak io.github.dimkar3000.rhesis

      - name: Generate release body from metainfo
        if: startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/release-body.py io.github.dimkar3000.rhesis.metainfo.xml > build/release_body.md

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/rhesis.flatpak
          body_path: build/release_body.md
