name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/rhesis-ci:kde-6.10
      options: --privileged

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            cmake \
            extra-cmake-modules \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-tools-dev-tools \
            libqt6svg6-dev \
            openjdk-17-jdk \
            wget \
            file \
            fuse \
            libfuse2

      - name: Download AppImage tools
        run: ./scripts/download-appimage-tools.sh

      - name: Build Full Bundle AppImage
        run: |
          ./scripts/build-appimage.sh \
            --linuxdeploy build/tools/appimage/linuxdeploy-x86_64.AppImage \
            --full-bundle

      - name: Build Minimal AppImage
        run: |
          ./scripts/build-appimage.sh \
            --linuxdeploy build/tools/appimage/linuxdeploy-x86_64.AppImage \
            --minimal \
            --skip-build

      - name: Generate release body from metainfo
        if: startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/release-body.py io.github.dimkar3000.rhesis.metainfo.xml > build/release_body.md

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/rhesis-*-x86_64.AppImage
            build/rhesis-*-minimal-x86_64.AppImage
          body_path: build/release_body.md
